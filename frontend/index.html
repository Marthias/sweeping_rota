<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Sweeping Rota</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-broom fa-3x" style="color: #667eea;"></i>
                <h1>Sweeping Rota</h1>
                <p>Sign in to manage your room chores</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #666;">
                Don't have an account? <a href="#" id="showRegister" style="color: #667eea;">Register</a>
            </p>
            <div id="loginError" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <!-- Register Screen -->
    <div id="registerScreen" class="container" style="display: none;">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-user-plus fa-3x" style="color: #667eea;"></i>
                <h1>Create Account</h1>
                <p>Join the sweeping rota</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="regPhone"><i class="fas fa-phone"></i> Phone (optional)</label>
                    <input type="tel" id="regPhone" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #666;">
                Already have an account? <a href="#" id="showLogin" style="color: #667eea;">Sign In</a>
            </p>
            <div id="registerError" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="mainApp" class="container" style="display: none;">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-broom"></i> Sweeping Rota</h1>
                <div class="user-info">
                    <span id="userName"><i class="fas fa-user-circle"></i></span>
                    <button id="logoutBtn" class="btn btn-logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            <div id="currentTime"></div>
        </header>

        <main>
            <!-- Today's Sweeper -->
            <section id="todaySweeper" class="card">
                <h2>Today's Sweeper</h2>
                <div id="sweeperInfo">
                    <div class="loader">Loading...</div>
                </div>
            </section>

            <!-- Upcoming Schedule -->
            <section id="upcomingSchedule" class="card">
                <h2>Upcoming Schedule</h2>
                <ul id="scheduleList"></ul>
            </section>

            <!-- Action Buttons -->
            <div id="actions">
                <button id="sweptBtn" class="btn btn-success" disabled>
                    <i class="fas fa-check"></i> I've Swept!
                </button>
                <button id="generateRotaBtn" class="btn btn-primary">
                    <i class="fas fa-sync"></i> Generate New Rota
                </button>
            </div>
        </main>

        <footer>
            <p>© 2026 Sweeping Rota | Made with ❤️ by OTrace</p>
        </footer>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification" style="display: none;">
        <span id="notificationMessage"></span>
        <button id="closeNotification">&times;</button>
    </div>

    <script>
    // Password toggle function
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const button = input.parentElement.querySelector('.toggle-password');
        const icon = button.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    </script>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
